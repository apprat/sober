<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="./styles/default.css">
</head>

<body>
  <s-page>

    <main>
      <s-button>
        <s-icon slot="start"></s-icon>
        button
      </s-button>
      <s-button type="filled" tabindex="1">
        <s-icon slot="start" type="search"></s-icon>
        button
      </s-button>
      <s-button type="filled-tonal" tabindex="2">
        <s-icon slot="start"></s-icon>
        enabled
      </s-button>
      <s-button type="outlined">
        button
      </s-button>
      <s-button type="text" tabindex="4">
        <s-icon slot="start" type="search"></s-icon>
        button
      </s-button>
    </main>

    <main>
      <s-button disabled="true">
        <s-icon slot="start"></s-icon>
        button
      </s-button>
      <s-button type="filled" disabled="true">
        <s-icon slot="start"></s-icon>
        button
      </s-button>
      <s-button type="filled-tonal" disabled="true">
        <s-icon slot="start"></s-icon>
        button
      </s-button>
      <s-button type="outlined" disabled="true">
        button
      </s-button>
      <s-button type="text" disabled="true">
        button
      </s-button>
    </main>
  </s-page>
  <script type="module" src="../dist/main.js"></script>
  <script src="./scripts/default.js"></script>
</body>

</html>
