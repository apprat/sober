<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="./styles/default.css">
  <script>
    const darkStyle = document.createElement('style')
    darkStyle.textContent = `@import url('../theme/dark.css');`
    const toggle = () => {
      document.head[!darkStyle.isConnected ? 'appendChild' : 'removeChild'](darkStyle)
    }
  </script>
</head>

<body>
  <s-floating-action-button type="extended" onclick="toggle()">
    Toggle
  </s-floating-action-button>
  <main>
    <s-button>
      <s-icon slot="start"></s-icon>
      filled
    </s-button>

    <s-button theme="elevated">
      <s-icon slot="start"></s-icon>
      elevated
    </s-button>

    <s-button theme="filled-tonal">
      <s-icon slot="start"></s-icon>
      filled-tonal
    </s-button>

    <s-button theme="outlined">
      outlined
    </s-button>

    <s-button theme="text">
      text button
    </s-button>
  </main>

  <script src="../dist/bundle.min.js"></script>
</body>

</html>
