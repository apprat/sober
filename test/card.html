<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="./styles/default.css">
  <script>
    const darkStyle = document.createElement('style')
    darkStyle.textContent = `@import url('../theme/dark.css');`
    const toggle = () => {
      document.head[!darkStyle.isConnected ? 'appendChild' : 'removeChild'](darkStyle)
    }
  </script>
  <style>
    s-card {
      height: 100px;
    }
  </style>
</head>

<body>
  <s-floating-action-button type="extended" onclick="toggle()">
    Toggle
  </s-floating-action-button>
  <main>
    <s-card>
      sss
    </s-card>
    <s-card type="filled">
      <s-button type="outlined" style="margin: 8px;">
        get started
      </s-button>
    </s-card>
    <s-card type="outlined">
      sss
    </s-card>
  </main>


  <main>
    <s-card disabled="true">
      sss
    </s-card>
    <s-card type="filled" disabled="true">
      <s-button type="outlined" style="margin: 8px;">
        get started
      </s-button>
    </s-card>
    <s-card type="outlined" disabled="true">
      sss
    </s-card>
  </main>

  <script src="../dist/bundle.min.js"></script>
</body>

</html>
