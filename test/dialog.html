<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="./styles/default.css">
  <script>
    const darkStyle = document.createElement('style')
    darkStyle.textContent = `@import url('../theme/dark.css');`
    const toggle = () => {
      document.head[!darkStyle.isConnected ? 'appendChild' : 'removeChild'](darkStyle)
    }
  </script>
</head>

<body>
  <s-floating-action-button type="extended" onclick="toggle()">
    Toggle
  </s-floating-action-button>
  <main>
    <s-dialog headline="Dialog Choice" positive-button="确认" onblur="console.log(event)">
      <s-button slot="trigger">
        Base
      </s-button>
      <p>
        The M3 baseline color scheme uses the same roles and token mapping as user-generated color schemes.
      </p>
    </s-dialog>

    <s-dialog headline="Dialog Choice" positive-button="确认">
      <s-button slot="trigger">
        Nesting
      </s-button>
      <p>
        The M3 baseline color scheme uses the same roles and token mapping as user-generated color schemes.
      </p>
      <s-dialog headline="Dialog Choice" positive-button="确认">
        <s-button slot="trigger" style="margin: 8px 16px;">
          Dialog
        </s-button>
        <s-label disabled="true">
          <s-checkbox slot="start"></s-checkbox>
          <div slot="title">选项 1</div>
          <div slot="subtitle">选择多选框</div>
        </s-label>
        <s-label>
          <s-checkbox slot="start"></s-checkbox>
          <div slot="title">选项 2</div>
          <div slot="subtitle">选择多选框</div>
        </s-label>
        <s-label>
          <s-checkbox slot="start"></s-checkbox>
          <div slot="title">选项 3</div>
          <div slot="subtitle">选择多选框</div>
        </s-label>
      </s-dialog>
    </s-dialog>


  </main>

  <script src="../dist/bundle.min.js"></script>
  <script>
  </script>
</body>

</html>
