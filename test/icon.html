<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="./styles/default.css">
  <script>
    const darkStyle = document.createElement('style')
    darkStyle.textContent = `@import url('../theme/dark.css');`
    const toggle = () => {
      document.head[!darkStyle.isConnected ? 'appendChild' : 'removeChild'](darkStyle)
    }
  </script>
</head>

<body>
  <s-floating-action-button type="extended" onclick="toggle()">
    Toggle
  </s-floating-action-button>
  <main>


    <s-icon></s-icon>
    <s-icon type="search"></s-icon>
    <s-icon type="menu"></s-icon>
    <s-icon type="arrow_back"></s-icon>
    <s-icon type="more_vert"></s-icon>
    <s-icon type="close"></s-icon>
    <s-icon type="chevron_right"></s-icon>
    <s-icon type="done"></s-icon>
    <s-icon type="expand_more"></s-icon>
    <s-icon type="arrow_drop_down"></s-icon>


    <s-icon d="M560-280 360-480l200-200v400Z"></s-icon>


  </main>

  <script src="../dist/bundle.min.js"></script>
</body>

</html>
