<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="./styles/default.css">
  </style>
</head>

<body>
  <s-fab type="extended"
    onclick="document.body.setAttribute('sober-theme',document.body.getAttribute('sober-theme')==='dark'?'':'dark')">
    Toggle
  </s-fab>
  <main>
    <s-label>
      <s-radio-button slot="start" name="dialog-radio-button"></s-radio-button>
      <div slot="title">选项 1</div>
    </s-label>
    <s-label>
      <s-radio-button slot="start" name="dialog-radio-button"></s-radio-button>
      <div slot="title">选项 2</div>
    </s-label>
    <s-label>
      <s-radio-button slot="start" name="dialog-radio-button"></s-radio-button>
      <div slot="title">选项 3</div>
    </s-label>
  </main>

  <main>
    <s-label>
      <s-checkbox slot="start"></s-checkbox>
      <div slot="title">选项 1</div>
    </s-label>
    <s-label>
      <s-checkbox slot="start"></s-checkbox>
      <div slot="title">选项 2</div>
    </s-label>
    <s-label>
      <s-checkbox slot="start"></s-checkbox>
      <div slot="title">选项 3</div>
    </s-label>
  </main>

  <main>
    <s-label>
      <s-checkbox slot="start"></s-checkbox>
      <div slot="title">选项 1</div>
      <div slot="subtitle">选择多选框</div>
    </s-label>
    <s-label>
      <s-checkbox slot="start"></s-checkbox>
      <div slot="title">选项 2</div>
      <div slot="subtitle">选择多选框</div>
    </s-label>
    <s-label>
      <s-checkbox slot="start"></s-checkbox>
      <div slot="title">选项 3</div>
      <div slot="subtitle">选择多选框</div>
    </s-label>
  </main>


  <script src="../dist/bundle.min.js"></script>
</body>

</html>
