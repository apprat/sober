<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="./styles/default.css">
  <script>
    const darkStyle = document.createElement('style')
    darkStyle.textContent = `@import url('../theme/dark.css');`
    const toggle = () => {
      document.head[!darkStyle.isConnected ? 'appendChild' : 'removeChild'](darkStyle)
    }
  </script>
</head>

<body>
  <s-floating-action-button type="extended" onclick="toggle()">
    Toggle
  </s-floating-action-button>
  <main>
    <s-radio-button name="test"></s-radio-button>
    <s-radio-button name="test">Selected</s-radio-button>
    <s-radio-button disabled="true"></s-radio-button>
    <s-radio-button checked="true" disabled="true">Select Group</s-radio-button>
  </main>

    <input type="radio" name="a" onchange="console.log('change3')">

  <script src="../dist/bundle.min.js"></script>
</body>

</html>
