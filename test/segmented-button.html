<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="./styles/default.css">
  <script>
    const darkStyle = document.createElement('style')
    darkStyle.textContent = `@import url('../theme/dark.css');`
    const toggle = () => {
      document.head[!darkStyle.isConnected ? 'appendChild' : 'removeChild'](darkStyle)
    }
  </script>
</head>

<body>
  <s-floating-action-button type="extended" onclick="toggle()">
    Toggle
  </s-floating-action-button>
  <main>
    <s-segmented-button>
      <s-segmented-button-item>
        <s-icon slot="start" type="done"></s-icon>
        hello
      </s-segmented-button-item>
      <s-segmented-button-item>
        index
      </s-segmented-button-item>
      <s-segmented-button-item disabled="true">
        users
      </s-segmented-button-item>

      <s-segmented-button-item>
        <s-icon slot="start" type="search"></s-icon>
        users
      </s-segmented-button-item>
    </s-segmented-button>

    <s-segmented-button>
      <s-segmented-button-item>
        <s-icon slot="start" type="done"></s-icon>
        hello
      </s-segmented-button-item>
      <s-segmented-button-item>
        index
      </s-segmented-button-item>
      <s-segmented-button-item>
        users
      </s-segmented-button-item>

      <s-segmented-button-item>
        <s-icon slot="start" type="search"></s-icon>
        users
      </s-segmented-button-item>
    </s-segmented-button>
  </main>

  <script src="../dist/bundle.min.js"></script>
</body>

</html>
