<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="../theme/auto.css">
  <style>
    * {
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    main>* {
      margin: 8px;
    }
  </style>
</head>

<body>
  <div>
    <s-button
      onclick="document.body.setAttribute('sober-theme',document.body.getAttribute('sober-theme')==='dark'?'':'dark')">
      toggle theme
    </s-button>
  </div>
  <hr>
  <main>
    <s-slider></s-slider>
    <input type="range" max="1000" step="100" value="100" style="width: 960px">
  </main>

  <script src="../dist/bundle.min.js"></script>
</body>

</html>
