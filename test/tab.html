<!DOCTYPE html>
<html lang="ZH-cn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Test</title>
  <link rel="stylesheet" href="../theme/auto.css">
  <style>
    * {
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    :not(:defined) {
      display: none;
    }

    body {
      margin: 0;
    }

    div>* {
      margin: 8px;
    }
  </style>
</head>

<body>
  <div>
    <s-button
      onclick="document.body.setAttribute('sober-theme',document.body.getAttribute('sober-theme')==='dark'?'':'dark')">
      toggle theme
    </s-button>
  </div>
  <hr>
  <div>
    <s-tab>
      <s-tab-item>首页</s-tab-item>
      <s-tab-item>服务</s-tab-item>
      <s-tab-item>社区</s-tab-item>
    </s-tab>
  </div>

  <script src="../dist/bundle.min.js"></script>
</body>

</html>
