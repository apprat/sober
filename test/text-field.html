<!DOCTYPE html>
<html>

<head>
  <style>
    .anime {
      position: absolute;
      left: 0px;
      width: 50px;
      height: 50px;
      background-color: red;
    }
  </style>
</head>

<body style="position: relative;">
  <div style="position: relative;width: 800px;background: #eee;">
    <div id="animatedElement" class="anime"></div>
    <div id="a" class="anime" style="margin-top: 100px;transition: transform .5s linear;transform: translateX(0%);">
    </div>
  </div>
  <button onclick="starts()" style="margin: 200px;">start</button>

  <script>
    const element = document.getElementById('animatedElement');
    const duration = 200;
    let startTime;
    function updataAnimate(timestamp) {
      if (!startTime) startTime = timestamp;
      const elapsedTime = timestamp - startTime;
      const progress = Math.min(elapsedTime / duration, 1);
      element.style.left = `${progress * 100}%`
      if (progress < 1) requestAnimationFrame(updataAnimate)
    }
    const a = document.getElementById('a');
    const starts = () => {
      requestAnimationFrame(updataAnimate)
      a.style.transform = 'translateX(800px)'
    }
  </script>
</body>

</html>
